spring.datasource.url=jdbc:mysql://localhost:3306/traffic_fine_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

payhere.merchant-id=${PAYHERE_MERCHANT_ID}
payhere.merchant-secret=${PAYHERE_MERCHANT_SECRET}
payhere.currency=LKR

# ---- SMS notification ----
# sms.provider = mock (default, logs only, no API key needed) | notifylk (real Notify.lk gateway)
sms.provider=mock

# Required only when sms.provider=notifylk. Get these from https://app.notify.lk settings.
sms.notifylk.user-id=${NOTIFYLK_USER_ID}
sms.notifylk.api-key=${NOTIFYLK_API_KEY}
sms.notifylk.sender-id=${NOTIFYLK_SENDER_ID}